<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Data copilot</title>
    <style>
      :root {
        --bg: #fafafa;
        --surface: #ffffff;
        --surface-elevated: #f4f4f5;
        --border: #e4e4e7;
        --text: #18181b;
        --muted: #71717a;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --ring: rgba(59, 130, 246, 0.35);
        --danger-bg: #fef2f2;
        --danger-border: #fecaca;
        --danger-text: #b91c1c;
        --warn-bg: #fffbeb;
        --warn-border: #fde68a;
        --warn-text: #92400e;
        --user-bg: #f4f4f5;
        --assistant-bg: #ffffff;
        --code-bg: #f4f4f5;
        --pre-bg: #fafafa;
        --radius: 10px;
        --font: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      html[data-theme='dark'] {
        --bg: #09090b;
        --surface: #18181b;
        --surface-elevated: #27272a;
        --border: #3f3f46;
        --text: #fafafa;
        --muted: #a1a1aa;
        --accent: #3b82f6;
        --accent-hover: #60a5fa;
        --ring: rgba(96, 165, 250, 0.35);
        --danger-bg: #450a0a;
        --danger-border: #7f1d1d;
        --danger-text: #fecaca;
        --warn-bg: #422006;
        --warn-border: #92400e;
        --warn-text: #fde68a;
        --user-bg: #27272a;
        --assistant-bg: #18181b;
        --code-bg: #27272a;
        --pre-bg: #09090b;
      }

      /* `hidden` must win over display:flex on .loading / .error-bar */
      [hidden] {
        display: none !important;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      .wrap {
        max-width: 36rem;
        margin: 0 auto;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: var(--surface);
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.02);
      }

      .sheet-header {
        padding: 1rem 1.25rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 0.75rem;
      }

      .sheet-header h1 {
        margin: 0 0 0.25rem;
        font-size: 1.125rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .sheet-header .subtitle {
        margin: 0;
        font-size: 0.875rem;
        color: var(--muted);
        max-width: 17rem;
        line-height: 1.45;
      }

      .header-actions {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 0.5rem;
        flex-shrink: 0;
      }

      .theme-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.75rem;
        color: var(--muted);
        user-select: none;
      }

      .theme-switch {
        position: relative;
        width: 2.25rem;
        height: 1.25rem;
        border-radius: 9999px;
        background: var(--surface-elevated);
        border: 1px solid var(--border);
        cursor: pointer;
        transition: background 0.15s ease;
      }

      .theme-switch:focus-visible {
        outline: 2px solid var(--ring);
        outline-offset: 2px;
      }

      .theme-switch::after {
        content: '';
        position: absolute;
        top: 2px;
        left: 2px;
        width: calc(1.25rem - 6px);
        height: calc(1.25rem - 6px);
        border-radius: 50%;
        background: var(--surface);
        border: 1px solid var(--border);
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
        transition: transform 0.15s ease;
      }

      html[data-theme='dark'] .theme-switch {
        background: var(--accent);
        border-color: var(--accent);
      }

      html[data-theme='dark'] .theme-switch::after {
        transform: translateX(1rem);
        background: #fff;
        border-color: transparent;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .banner-warn {
        margin: 0 1.25rem 1rem;
        padding: 0.75rem 1rem;
        border-radius: var(--radius);
        font-size: 0.875rem;
        background: var(--warn-bg);
        color: var(--warn-text);
        border: 1px solid var(--warn-border);
      }

      .messages-wrap {
        flex: 1;
        overflow-y: auto;
        padding: 1rem 1.25rem;
        min-height: 12rem;
      }

      .empty-hint {
        font-size: 0.875rem;
        color: var(--muted);
        margin: 0 0 1rem;
      }

      #messages {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .bubble {
        max-width: 95%;
        padding: 0.5rem 0.75rem;
        border-radius: var(--radius);
        font-size: 0.875rem;
      }

      .bubble.user {
        align-self: flex-end;
        background: var(--user-bg);
        border: 1px solid var(--border);
        white-space: pre-wrap;
        word-break: break-word;
      }

      .bubble.assistant {
        align-self: flex-start;
        background: var(--assistant-bg);
        border: 1px solid var(--border);
      }

      .bubble.assistant .md p {
        margin: 0 0 0.5rem;
      }

      .bubble.assistant .md p:last-child {
        margin-bottom: 0;
      }

      .bubble.assistant .md pre {
        overflow-x: auto;
        padding: 0.6rem 0.75rem;
        border-radius: 6px;
        background: var(--pre-bg);
        border: 1px solid var(--border);
        font-size: 0.8125rem;
        margin: 0.5rem 0;
      }

      .bubble.assistant .md code {
        font-family: var(--mono);
        font-size: 0.82em;
      }

      .bubble.assistant .md p code,
      .bubble.assistant .md li code {
        background: var(--code-bg);
        padding: 0.1rem 0.3rem;
        border-radius: 4px;
        border: 1px solid var(--border);
      }

      .bubble.assistant .md ul,
      .bubble.assistant .md ol {
        margin: 0.35rem 0 0.35rem 1.25rem;
        padding: 0;
      }

      .bubble.assistant .md a {
        color: var(--accent);
      }

      .bubble.assistant .md table {
        border-collapse: collapse;
        width: 100%;
        font-size: 0.8125rem;
        margin: 0.5rem 0;
      }

      .bubble.assistant .md th,
      .bubble.assistant .md td {
        border: 1px solid var(--border);
        padding: 0.35rem 0.5rem;
        text-align: left;
      }

      .bubble.assistant .md th {
        background: var(--surface-elevated);
      }

      .loading {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0 1.25rem 0.75rem;
        font-size: 0.875rem;
        color: var(--muted);
      }

      .loading .spinner {
        width: 1rem;
        height: 1rem;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: copilot-spin 0.65s linear infinite;
        flex-shrink: 0;
      }

      @keyframes copilot-spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
        justify-content: space-between;
        margin: 0 1.25rem 0.75rem;
        padding: 0.75rem 1rem;
        border-radius: var(--radius);
        font-size: 0.875rem;
        background: var(--danger-bg);
        color: var(--danger-text);
        border: 1px solid var(--danger-border);
      }

      .composer {
        border-top: 1px solid var(--border);
        padding: 1rem 1.25rem 1.25rem;
        margin-top: auto;
        background: var(--surface);
      }

      .composer label {
        display: block;
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--muted);
        margin-bottom: 0.35rem;
      }

      textarea {
        width: 100%;
        min-height: 5rem;
        resize: vertical;
        padding: 0.5rem 0.65rem;
        border-radius: calc(var(--radius) - 2px);
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-family: inherit;
        font-size: 0.875rem;
      }

      textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--ring);
      }

      textarea:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        background: var(--surface-elevated);
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 0.65rem;
        justify-content: flex-end;
      }

      button {
        font-family: inherit;
        font-size: 0.875rem;
        padding: 0.45rem 0.9rem;
        border-radius: calc(var(--radius) - 2px);
        cursor: pointer;
        font-weight: 500;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
        border: 1px solid var(--accent);
      }

      .btn-primary:hover:not(:disabled) {
        background: var(--accent-hover);
        border-color: var(--accent-hover);
      }

      .btn-secondary {
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
      }

      .btn-secondary:hover:not(:disabled) {
        background: var(--surface-elevated);
      }

      .btn-ghost {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
      }

      .btn-ghost:hover:not(:disabled) {
        background: var(--surface-elevated);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="sheet-header">
        <div>
          <h1>Data copilot</h1>
          <p class="subtitle">
            Ask questions about your data catalog. Conversation is scoped to this workspace and your
            user.
          </p>
        </div>
        <div class="header-actions">
          <div class="theme-row">
            <span id="themeLabel">Light</span>
            <button
              type="button"
              class="theme-switch"
              id="themeToggle"
              role="switch"
              aria-checked="false"
              aria-labelledby="themeLabel"
              title="Toggle dark mode"
            ></button>
          </div>
          <button type="button" class="btn-ghost" id="newChatBtn" style="font-size: 0.8125rem">
            New chat
          </button>
        </div>
      </div>

      <div id="missingBanner" class="banner-warn" hidden></div>

      <div class="messages-wrap">
        <p id="emptyHint" class="empty-hint" hidden>
          Send a message to start. Follow-up messages reuse the same thread until you start a new
          chat.
        </p>
        <div id="messages" aria-live="polite"></div>
        <div id="loadingRow" class="loading" hidden>
          <span class="spinner" aria-hidden="true"></span>
          Thinking…
        </div>
      </div>

      <div id="errorBar" class="error-bar" hidden role="alert">
        <span id="errorText"></span>
        <button type="button" class="btn-secondary" id="retryBtn">Retry</button>
      </div>

      <div class="composer">
        <label for="q">Message</label>
        <textarea id="q" placeholder="Ask about your data inventory…" aria-label="Message"></textarea>
        <div class="row">
          <button type="button" class="btn-primary" id="sendBtn">Send</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script>
      (function () {
        var THEME_KEY = 'poc-data-copilot:theme';
        var DEFAULT_API = 'http://127.0.0.1:8000/';

        function qs() {
          return new URLSearchParams(window.location.search);
        }

        function threadKey(accountId, userId) {
          return 'poc-data-copilot:thread:' + accountId + ':' + userId;
        }

        function getConfig() {
          var p = qs();
          var apiBase = (p.get('api_base') || DEFAULT_API).replace(/\/$/, '');
          var accountId = p.get('account_id') || '';
          var userId = p.get('user_id') || '';
          return { apiBase: apiBase, accountId: accountId, userId: userId };
        }

        var cfg = getConfig();
        var threadId = null;
        var messages = [];
        var loading = false;
        var retryPayload = null;

        var el = {
          missingBanner: document.getElementById('missingBanner'),
          emptyHint: document.getElementById('emptyHint'),
          messages: document.getElementById('messages'),
          loadingRow: document.getElementById('loadingRow'),
          errorBar: document.getElementById('errorBar'),
          errorText: document.getElementById('errorText'),
          retryBtn: document.getElementById('retryBtn'),
          q: document.getElementById('q'),
          sendBtn: document.getElementById('sendBtn'),
          newChatBtn: document.getElementById('newChatBtn'),
          themeToggle: document.getElementById('themeToggle'),
          themeLabel: document.getElementById('themeLabel'),
        };

        function applyTheme(dark) {
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
          el.themeToggle.setAttribute('aria-checked', dark ? 'true' : 'false');
          el.themeLabel.textContent = dark ? 'Dark' : 'Light';
          try {
            localStorage.setItem(THEME_KEY, dark ? 'dark' : 'light');
          } catch (e) {}
        }

        function initTheme() {
          var stored = null;
          try {
            stored = localStorage.getItem(THEME_KEY);
          } catch (e) {}
          var dark = stored === 'dark';
          applyTheme(dark);
        }

        el.themeToggle.addEventListener('click', function () {
          var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
          applyTheme(!isDark);
        });

        function mapStatus(status) {
          if (status === 400)
            return 'The copilot could not process that request. Try rephrasing your question.';
          if (status === 502)
            return 'The answer service is temporarily unavailable. Please try again in a moment.';
          if (status === 503)
            return 'The copilot provider is not configured. Try again later or contact support.';
          return 'Something went wrong. Please try again.';
        }

        function detailToString(detail) {
          if (typeof detail === 'string' && detail.trim()) return detail;
          if (Array.isArray(detail)) {
            var parts = detail
              .map(function (item) {
                if (item && typeof item === 'object' && typeof item.msg === 'string') return item.msg;
                return null;
              })
              .filter(Boolean);
            if (parts.length) return parts.join(' ');
          }
          return null;
        }

        function renderMarkdown(text) {
          if (typeof marked !== 'undefined' && marked.parse) {
            marked.setOptions({ breaks: true, gfm: true });
            var raw = marked.parse(text, { async: false });
            if (typeof DOMPurify !== 'undefined') return DOMPurify.sanitize(raw);
            return raw;
          }
          return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function canChat() {
          cfg = getConfig();
          return Boolean(cfg.accountId && cfg.userId);
        }

        function loadThreadFromStorage() {
          if (!canChat()) return;
          try {
            var s = sessionStorage.getItem(threadKey(cfg.accountId, cfg.userId));
            threadId = s || null;
          } catch (e) {
            threadId = null;
          }
        }

        function persistThread(id) {
          if (!canChat()) return;
          try {
            if (id) sessionStorage.setItem(threadKey(cfg.accountId, cfg.userId), id);
            else sessionStorage.removeItem(threadKey(cfg.accountId, cfg.userId));
          } catch (e) {}
        }

        function renderMessages() {
          el.messages.innerHTML = '';
          for (var i = 0; i < messages.length; i++) {
            var m = messages[i];
            var div = document.createElement('div');
            div.className = 'bubble ' + (m.role === 'user' ? 'user' : 'assistant');
            if (m.role === 'user') {
              div.textContent = m.content;
            } else {
              var inner = document.createElement('div');
              inner.className = 'md';
              inner.innerHTML = renderMarkdown(m.content);
              div.appendChild(inner);
            }
            el.messages.appendChild(div);
          }
          var wrap = el.messages.parentElement;
          if (wrap) wrap.scrollTop = wrap.scrollHeight;
        }

        function updateEmptyHint() {
          var show = messages.length === 0 && !loading && canChat();
          el.emptyHint.hidden = !show;
        }

        function setLoading(on) {
          loading = on;
          el.loadingRow.hidden = !on;
          el.q.disabled = on || !canChat();
          el.sendBtn.disabled = on || !canChat() || !el.q.value.trim();
          el.newChatBtn.disabled = on || !canChat();
          updateEmptyHint();
        }

        function setError(msg, retry) {
          retryPayload = retry;
          var hasMsg = Boolean(msg);
          el.errorBar.hidden = !hasMsg;
          el.errorText.textContent = msg || '';
          el.retryBtn.hidden = !retry;
        }

        function updateMissingBanner() {
          cfg = getConfig();
          if (!canChat()) {
            el.missingBanner.hidden = false;
            el.missingBanner.textContent =
              'This page needs account_id and user_id in the URL to connect. Ask your administrator for a link with those parameters.';
          } else {
            el.missingBanner.hidden = true;
          }
        }

        function sendAsk(query, threadIdForRequest, appendUser) {
          if (!canChat()) return;
          var trimmed = query.trim();
          if (!trimmed) return;

          setError(null, null);
          setLoading(true);
          if (appendUser) {
            messages.push({ role: 'user', content: trimmed });
            renderMessages();
          }

          var body = { query: trimmed };
          if (threadIdForRequest) body.thread_id = threadIdForRequest;

          var url = cfg.apiBase + '/v1/copilot/ask/' + encodeURIComponent(cfg.accountId);

          fetch(url, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-User-Id': String(cfg.userId),
            },
            body: JSON.stringify(body),
          })
            .then(function (res) {
              return res.text().then(function (raw) {
                var data = null;
                try {
                  data = raw ? JSON.parse(raw) : null;
                } catch (e) {
                  data = null;
                }
                return { res: res, data: data };
              });
            })
            .then(function (_ref) {
              var res = _ref.res;
              var data = _ref.data;
              if (!res.ok) {
                var detail =
                  data && typeof data === 'object' && 'detail' in data ? data.detail : undefined;
                var msg = detailToString(detail) || mapStatus(res.status);
                setError(msg, { query: trimmed, threadIdForRequest: threadIdForRequest });
                renderMessages();
                return;
              }
              var answer = data && typeof data.answer === 'string' ? data.answer : '';
              var nextThread =
                data && typeof data.thread_id === 'string' && data.thread_id.length > 0
                  ? data.thread_id
                  : null;
              if (nextThread) {
                threadId = nextThread;
                persistThread(nextThread);
              }
              messages.push({ role: 'assistant', content: answer || '—' });
              renderMessages();
            })
            .catch(function () {
              setError(
                'Could not reach the copilot service. Check your network or CORS (this origin must be allowed).',
                { query: trimmed, threadIdForRequest: threadIdForRequest },
              );
              renderMessages();
            })
            .finally(function () {
              setLoading(false);
              el.sendBtn.disabled = !canChat() || !el.q.value.trim();
            });
        }

        function handleSend() {
          if (loading || !canChat()) return;
          var trimmed = el.q.value.trim();
          if (!trimmed) return;
          el.q.value = '';
          el.sendBtn.disabled = true;
          sendAsk(trimmed, threadId, true);
        }

        function handleRetry() {
          if (!retryPayload || loading) return;
          var q = retryPayload.query;
          var t = retryPayload.threadIdForRequest;
          setError(null, null);
          renderMessages();
          sendAsk(q, t, false);
        }

        function newChat() {
          messages = [];
          threadId = null;
          persistThread(null);
          setError(null, null);
          renderMessages();
          updateEmptyHint();
        }

        el.sendBtn.addEventListener('click', handleSend);
        el.q.addEventListener('input', function () {
          el.sendBtn.disabled = loading || !canChat() || !el.q.value.trim();
        });
        el.q.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleSend();
          }
        });
        el.retryBtn.addEventListener('click', handleRetry);
        el.newChatBtn.addEventListener('click', newChat);

        window.addEventListener('popstate', function () {
          cfg = getConfig();
          loadThreadFromStorage();
          messages = [];
          setError(null, null);
          updateMissingBanner();
          renderMessages();
          updateEmptyHint();
        });

        initTheme();
        loadThreadFromStorage();
        updateMissingBanner();
        renderMessages();
        setLoading(false);
        setError(null, null);
        el.sendBtn.disabled = !canChat() || !el.q.value.trim();
        el.newChatBtn.disabled = !canChat();
        el.q.disabled = !canChat();
        updateEmptyHint();
      })();
    </script>
  </body>
</html>
